name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Swift
      uses: swift-actions/setup-swift@v1
      with:
        swift-version: "5.9"
    
    - name: Get Swift version
      run: swift --version
    
    - name: Build (Debug)
      run: swift build
    
    - name: Build (Release)
      run: swift build -c release
    
    - name: Test CLI
      run: |
        .build/debug/voicecli --help || true
        .build/debug/voicecli voices | head -5
        .build/debug/voicecli speak "CI build test" --output /tmp/ci_test.aiff
        test -f /tmp/ci_test.aiff && echo "Audio file generated successfully"
